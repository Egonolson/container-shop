upstream seyfarth_medusa {
    server seyfarth-medusa:9000;
}

upstream seyfarth_storefront {
    server seyfarth-storefront:3000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50m;
    proxy_read_timeout 300s;
    proxy_connect_timeout 60s;

    # Medusa Store API (Storefront-Requests vom JS-SDK)
    location /store/ {
        proxy_pass http://seyfarth_medusa/store/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Medusa Auth API
    location /auth/ {
        proxy_pass http://seyfarth_medusa/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Medusa Admin API (direkte Backend-Anfragen)
    location /admin/api/ {
        proxy_pass http://seyfarth_medusa/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Medusa Admin Panel (statisches Build)
    location /admin {
        alias /usr/share/nginx/admin/;
        try_files $uri $uri/ /admin/index.html;
        add_header Cache-Control "no-cache";
    }

    # Next.js Storefront (alles andere)
    location / {
        proxy_pass http://seyfarth_storefront;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
