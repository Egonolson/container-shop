limit_req_zone $binary_remote_addr zone=shop_requests:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=email_check:10m rate=10r/m;
limit_req_status 429;

upstream seyfarth_storefront {
    server seyfarth-storefront:3000;
}

# NOTE: seyfarth-kong is only started behind the `supabase` compose profile
# (currently DEV only). A static `upstream {}` block would make nginx fail to
# start on any host where that container doesn't exist (DNS resolved once at
# startup). So Kong is proxied via a variable + Docker's embedded DNS
# resolver instead — resolved per-request, missing backend just 502s those
# specific paths instead of taking the whole site down.

server {
    listen 80;
    server_name _;

    client_max_body_size 2m;
    proxy_read_timeout 300s;
    proxy_connect_timeout 60s;
    resolver 127.0.0.11 valid=10s;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; img-src 'self' data: https://containerdienst-seyfarth.onepage.me https://www.containerdienst-seyfarth.de https://onecdn.io; font-src 'self' data: https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline'; connect-src 'self'; form-action 'self'; upgrade-insecure-requests" always;

    # Legacy Medusa-Flächen sind im öffentlichen Anfrage-Shop deaktiviert.
    # /login, /registrieren, /admin und /auth/ sind seit dem R1-Portal-Ausbau
    # echte Routen (Next.js bzw. Supabase) und daher NICHT mehr hier geblockt.
    location = /store { return 404; }
    location ^~ /store/ { return 404; }
    location = /app { return 404; }
    location ^~ /app/ { return 404; }
    location = /dashboard { return 404; }
    location ^~ /dashboard/ { return 404; }
    location = /orders { return 404; }
    location ^~ /orders/ { return 404; }
    location = /locations { return 404; }
    location ^~ /locations/ { return 404; }
    location ^~ /p/ { return 404; }
    location ^~ /embed/ { return 404; }

    # --- Supabase (self-hosted, Single-Port-Architektur) ---
    # Nur erreichbar, wenn der `supabase`-Compose-Profil aktiv ist (aktuell
    # DEV). Same-origin -> CSP `connect-src 'self'` bleibt unveraendert.
    # NOTE: proxy_pass targets use a variable ($kong_upstream) so the
    # hostname is resolved per-request via the resolver above, not once at
    # startup (see note at the top of this file). With a variable in
    # proxy_pass, nginx does NOT do its usual "replace the matched location
    # prefix" rewriting — it appends the path written here to the ORIGINAL
    # request URI, which would double the /auth/v1 etc. prefix. So no path
    # is given after the port here; the client's original URI (which already
    # contains /auth/v1/...) is forwarded as-is, and Kong's own
    # strip_path does the rest.
    location /auth/v1/ {
        set $kong_upstream seyfarth-kong;
        proxy_pass http://$kong_upstream:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Rate-limited: lets the public configurator check whether an email
    # already has an account (see email_has_account() migration). This
    # location is more specific than /rest/v1/ below and therefore takes
    # precedence for exactly this path — everything else under /rest/v1/
    # keeps the normal, unthrottled proxying.
    location /rest/v1/rpc/email_has_account {
        limit_req zone=email_check burst=5 nodelay;
        set $kong_upstream seyfarth-kong;
        proxy_pass http://$kong_upstream:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /rest/v1/ {
        set $kong_upstream seyfarth-kong;
        proxy_pass http://$kong_upstream:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /storage/v1/ {
        set $kong_upstream seyfarth-kong;
        proxy_pass http://$kong_upstream:8000;
        proxy_http_version 1.1;
        client_max_body_size 55m;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/shop-requests {
        limit_req zone=shop_requests burst=5 nodelay;
        client_max_body_size 128k;
        proxy_pass http://seyfarth_storefront;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js Storefront (alles andere)
    location / {
        proxy_pass http://seyfarth_storefront;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
