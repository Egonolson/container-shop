name: Storefront CI

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "storefront/**"
      - ".github/workflows/storefront-ci.yml"

defaults:
  run:
    working-directory: storefront

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: storefront/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
