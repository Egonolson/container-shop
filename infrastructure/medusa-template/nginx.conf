upstream medusa {
    server ${SHOP_NAME}-medusa:9000;
}
upstream storefront {
    server ${SHOP_NAME}-storefront:3000;
}
server {
    listen 80;
    server_name _;

    location = /app { return 301 /app/; }

    location /app/assets/ {
        alias /usr/share/nginx/admin/assets/;
    }

    location /app/ {
        if ($http_accept ~* "text/html") {
            rewrite ^ /admin-spa last;
        }
        proxy_pass http://medusa;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin-spa {
        internal;
        alias /usr/share/nginx/admin/index.html;
        default_type text/html;
    }

    location = /admin { return 301 /app/; }
    location /admin/ { return 301 /app/; }

    location /store/ {
        proxy_pass http://medusa;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass http://medusa;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://storefront;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
