global:
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'alerts@vision-x-digital.de'
  smtp_auth_username: '${SMTP_USER}'
  smtp_auth_password: '${SMTP_PASSWORD}'
  smtp_require_tls: true

route:
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'email'
  routes:
    - match:
        severity: critical
      receiver: 'email'
      repeat_interval: 1h

receivers:
  - name: 'email'
    email_configs:
      - to: 'info@vision-x-digital.de'
        send_resolved: true
