groups:
  - name: shop-alerts
    rules:
      - alert: ContainerDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.instance }} ist down"

      - alert: HighCPU
        expr: rate(container_cpu_usage_seconds_total[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Hohe CPU: {{ $labels.name }}"

      - alert: HighMemory
        expr: container_memory_usage_bytes / container_spec_memory_limit_bytes * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Hoher RAM: {{ $labels.name }}"

      - alert: DiskFull
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 10
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Disk fast voll (< 10% frei)"

      - alert: ContainerRestarting
        expr: increase(container_restart_count[15m]) > 3
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} restartet wiederholt"
