upstream medusa {
    server medusa:9000;
}

upstream storefront {
    server storefront:3000;
}

server {
    listen 80;
    server_name _;

    # Admin SPA: redirect /app -> /app/
    location = /app {
        return 301 /app/;
    }

    # Admin SPA: static assets (JS, CSS, images)
    location /app/assets/ {
        alias /usr/share/nginx/admin/assets/;
    }

    # Admin SPA: serve index.html for browser, proxy API for fetch/XHR
    location /app/ {
        if ($http_accept ~* "text/html") {
            rewrite ^ /admin-spa last;
        }
        proxy_pass http://medusa;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Internal: serve admin SPA index.html
    location = /admin-spa {
        internal;
        alias /usr/share/nginx/admin/index.html;
        default_type text/html;
    }

    # Legacy /admin redirect to /app
    location = /admin {
        return 301 /app/;
    }
    location /admin/ {
        return 301 /app/;
    }

    # Medusa Store API
    location /store/ {
        proxy_pass http://medusa;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Medusa Auth API
    location /auth/ {
        proxy_pass http://medusa;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else -> storefront
    location / {
        proxy_pass http://storefront;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
