services:
  postgres:
    image: postgres:16-alpine
    container_name: containershop-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-medusa-store}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: containershop-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  medusa:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: containershop-medusa
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/medusa-store
      REDIS_URL: redis://redis:6379
      STORE_CORS: http://localhost:8000
      ADMIN_CORS: http://localhost:9000
      AUTH_CORS: http://localhost:8000,http://localhost:9000
      COOKIE_SECRET: prototype-cookie-secret-change-in-prod
      JWT_SECRET: prototype-jwt-secret-change-in-prod
      SMTP_HOST: ${SMTP_HOST:-smtp-relay.brevo.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@seyfarth-container.de}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Seyfarth Container-Dienst}
      OPERATOR_EMAIL: ${OPERATOR_EMAIL:-info@seyfarth-container.de}
    volumes:
      - ./backend/src:/app/src

  storefront:
    build:
      context: ./storefront
      dockerfile: Dockerfile.dev
    container_name: containershop-storefront
    depends_on:
      - medusa
    ports:
      - "8000:3000"
    environment:
      NEXT_PUBLIC_MEDUSA_URL: http://localhost:9000
      MEDUSA_INTERNAL_URL: http://medusa:9000
      NEXT_PUBLIC_SITE_URL: http://localhost:8000
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${MEDUSA_PUBLISHABLE_KEY:-pk_86277091f5d70188b2d63bad51666da7f0430ccbdc73a7d9f513e41064fd477e}
      NEXT_PUBLIC_MAIN_WEBSITE_URL: ${MAIN_WEBSITE_URL:-https://www.seyfarth-container.de}
    volumes:
      - ./storefront/src:/app/src

volumes:
  postgres_data:
  redis_data:
